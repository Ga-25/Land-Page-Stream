      // ✅ FURION POWER - EVENT ID ULTRA-ROBUSTO
    function generateSyncEventId(eventType = 'reg') {
      const timestamp = Date.now();
      const random = Math.random().toString(36).substring(2, 9);
      
      // Múltiplas fontes de backup para recuperar base ID
      let baseId = localStorage.getItem('furion_base_event') || 
                  sessionStorage.getItem('furion_base_event') ||
                  getCookie('furion_event_base') ||
                  null;
      
      if (!baseId) {
          // Gerar novo base ID único
          baseId = `base_${timestamp}_${random}`;
          
          // Salvar em múltiplos locais (máxima confiabilidade)
          try {
              localStorage.setItem('furion_base_event', baseId);
              sessionStorage.setItem('furion_base_event', baseId);
              document.cookie = `furion_event_base=${baseId}; path=/; max-age=7200; SameSite=None; Secure`;

          } catch(e) {
              console.warn('Erro ao salvar base ID:', e);
          }
      }
      
      // Gerar event ID específico
      const eventId = baseId.replace('base_', `${eventType}_`);
      console.log(`🎯 Event ID gerado: ${eventId}`);
      return eventId;
    }

    // FURION POWER - Helper Functions
    function generateTransactionId() {
      return `FTV_${Date.now()}_${Math.random().toString(36).substring(2, 9)}`;
    }


        // ✅ FURION POWER - FUNÇÕES DE INTELIGÊNCIA ARTIFICIAL


    function calculateLeadScore(formData) {
        let score = 0;
        
        // Email quality
        const emailDomain = formData.email.split('@')[1];
        const premiumDomains = ['gmail.com', 'hotmail.com', 'outlook.com', 'yahoo.com', 'icloud.com'];
        if (premiumDomains.includes(emailDomain)) score += 25;
        
        // Phone quality
        if (formData.whatsapp.length >= 14) score += 25;
        
        // Name quality
        if (formData.nome.split(' ').length >= 2) score += 20;
        
        // Engagement quality
        const engagementTime = Date.now() - (window.formStartTime || Date.now());
        if (engagementTime > 30000 && engagementTime < 300000) score += 30; // 30s - 5min sweet spot
        
        return Math.min(score, 100);
    }


    function calculateIntentScore() {
        let score = 0;
        
        // Time on page
        const timeOnPage = Date.now() - (window.pageLoadTime || Date.now());
        if (timeOnPage > 60000) score += 30; // Mais de 1 minuto
        
        // Scroll behavior
        if (window.maxScrollReached >= 50) score += 25;
        
        // Form interactions
        const formInteractions = window.formInteractions || 0;
        score += Math.min(formInteractions * 5, 25);
        
        // UTM source quality
        const utmSource = localStorage.getItem('utm_source');
        if (utmSource && utmSource !== 'direct') score += 20;
        
        return Math.min(score, 100);
    }


    function calculateTrafficQuality(formData) {
        const source = formData.utm_source;
        const qualityMap = {
            'google': 'high',
            'facebook': 'high', 
            'instagram': 'high',
            'youtube': 'medium',
            'tiktok': 'medium',
            'organic': 'very_high',
            'direct': 'high'
        };
        return qualityMap[source] || 'medium';
    }


    function getEngagementLevel() {
        const timeOnPage = Date.now() - (window.pageLoadTime || Date.now());
        const scrollDepth = window.maxScrollReached || 0;
        const interactions = window.formInteractions || 0;
        
        if (timeOnPage > 120000 && scrollDepth > 75 && interactions > 5) return 'very_high';
        if (timeOnPage > 60000 && scrollDepth > 50 && interactions > 3) return 'high';
        if (timeOnPage > 30000 && scrollDepth > 25) return 'medium';
        return 'low';
    }


    function getTouchInteractions() {
        return window.touchInteractions || 0;
    }


    function getAttributionPath() {
        const path = [];
        if (document.referrer) path.push('referrer');
        if (localStorage.getItem('utm_source')) path.push('utm');
        if (localStorage.getItem('_fbc')) path.push('facebook');
        return path.join(' -> ') || 'direct';
    }

          headers: { 'Content-Type': 'application/json' },

      } catch (error) {
        console.error(`❌ CAPI Error ${endpoint}:`, error);
        return { error: error.message };

👤 Nome: ${data.nome}
📧 Email: ${data.email}
📱 WhatsApp: ${data.whatsapp}
💳 ID Transação: ${data.transacao}
🎯 Origem: ${data.utm_source} / ${data.utm_campaign}
⏰ Data/Hora: ${new Date().toLocaleString('pt-BR')}
✅ Status: PREMIUM ATIVADO!



🚀 Próximo passo: Enviar credenciais de acesso
💎 Cliente Premium confirmado!`;

        setTimeout(() => {
          const url = `https://wa.me/${number}?text=${encodeURIComponent(message)}`;

           //window.open(url, '_blank');
        }, index * 1000); // Delay entre envios
      });
    }



    let initiatedCheckout = false;

    // FURION POWER - Enhanced Tracking Initialization

      window.formStartTime = Date.now();

      // Session tracking

    // Utility functions
    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
       const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }

    function validateField(input) {
    let valid = true;
    const value = input.value.trim();

    // 🔤 NOME (somente letras + mínimo 3 caracteres)
    if (input.name === 'nome') {
        valid = /^[a-zA-ZÀ-ÿ\s]{3,}$/.test(value);
    }

    // 📧 EMAIL (formato válido)
    else if (input.type === 'email') {
        valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
    }

    // 📱 WHATSAPP (formato mais flexível)
    else if (input.name === 'whatsapp') {
        // Remove formatação para validar apenas números
        const numbersOnly = value.replace(/\D/g, '');
        // Aceita 10 ou 11 dígitos (com ou sem o 9 extra)
        valid = numbersOnly.length >= 10 && numbersOnly.length <= 11;
        
        // Log para debug
        console.log('📱 Validação telefone:', value, '→', numbersOnly, '→', valid);
    }

    // RESET CLASSES
    input.classList.remove('valid', 'invalid');

    if (valid) {
        input.classList.add('valid');
    } else {
        input.classList.add('invalid');
    }

    return valid;
    }
